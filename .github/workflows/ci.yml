# CI: configure + build + CTest on GitHub-hosted runners.
#
# Matrix: macOS (arm64 + Intel), Ubuntu amd64 + arm64, Windows amd64 + arm64, plus Poppler-Qt6
# on Ubuntu only. PDFium prebuilt fetch uses public bblanchon/pdfium-binaries assets
# (pinned SHA-256 in cmake/PdfiumPrebuilt.cmake) — no repository secrets.
#
# Job pdfium-root-no-fetch: Ubuntu only — caches extracted linux-x64 prebuilt, configures with
# PDFDOCUMENTVIEW_FETCH_PDFIUM=OFF + PDFIUM_ROOT (no CMake download), runs CTest + notices script.
#
# Runner labels follow GitHub’s standard hosted table (see README CI section).

name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS — arm64 (Apple Silicon) + Intel (dedicated Intel images per GHA docs)
          - os: macos-15
            cpu: arm64
            variant: pdfium
            qt_host: ""
            qt_arch: ""
            qt_archives: qtbase
          - os: macos-15-intel
            cpu: x64
            variant: pdfium
            qt_host: ""
            qt_arch: ""
            qt_archives: qtbase
          # Linux — amd64 + arm64 (partner image); Poppler real backend on both
          - os: ubuntu-24.04
            cpu: x64
            variant: pdfium
            qt_host: linux
            qt_arch: linux_gcc_64
            qt_archives: qtbase icu
          - os: ubuntu-24.04-arm
            cpu: arm64
            variant: pdfium
            qt_host: linux_arm64
            qt_arch: linux_gcc_arm64
            qt_archives: qtbase icu
          - os: ubuntu-24.04
            cpu: x64
            variant: poppler-real
            qt_host: linux
            qt_arch: linux_gcc_64
            qt_archives: qtbase icu
          - os: ubuntu-24.04-arm
            cpu: arm64
            variant: poppler-real
            qt_host: linux_arm64
            qt_arch: linux_gcc_arm64
            qt_archives: qtbase icu
          # Windows — x64 + arm64 (partner image); PDFIUM only (no apt Poppler on GHA Windows)
          - os: windows-latest
            cpu: x64
            variant: pdfium
            qt_host: windows
            qt_arch: win64_msvc2022_64
            qt_archives: qtbase
          - os: windows-11-arm
            cpu: arm64
            variant: pdfium
            qt_host: windows_arm64
            qt_arch: win64_msvc2022_arm64
            qt_archives: qtbase

    runs-on: ${{ matrix.os }}

    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4

      - name: Install Poppler-Qt6 dev (Ubuntu, real Poppler backend)
        if: matrix.variant == 'poppler-real'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libpoppler-qt6-dev

      - name: ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ github.workflow }}-${{ matrix.os }}-${{ matrix.cpu }}-${{ matrix.variant }}-${{ github.sha }}
          restore-keys: |
            ${{ github.workflow }}-${{ matrix.os }}-${{ matrix.cpu }}-${{ matrix.variant }}-

      - name: Install Qt 6.8.3 (host/arch from matrix)
        if: matrix.qt_host != ''
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.3'
          cache: true
          archives: ${{ matrix.qt_archives }}
          target: desktop
          host: ${{ matrix.qt_host }}
          arch: ${{ matrix.qt_arch }}

      - name: Install Qt 6.8.3 (macOS — action defaults)
        if: matrix.qt_host == ''
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.3'
          cache: true
          archives: ${{ matrix.qt_archives }}

      - name: Configure
        env:
          PKG_CONFIG_ALLOW_SYSTEM_CFLAGS: "1"
          POPPLER_CMAKE_FLAGS: -DPDFDOCUMENTVIEW_RENDER_BACKEND=POPPLER -DPDFDOCUMENTVIEW_POPPLER_REAL=ON
        run: |
          set -euo pipefail
          ARCH_FLAGS=""
          if [ "${{ matrix.cpu }}" = "arm64" ]; then
            ARCH_FLAGS="-DPDFDOCUMENTVIEW_CMAKE_ARCH=aarch64"
          else
            ARCH_FLAGS="-DPDFDOCUMENTVIEW_CMAKE_ARCH=x86_64"
          fi
          EXTRA_FLAGS=""
          if [ "${{ matrix.variant }}" = "poppler-real" ]; then
            EXTRA_FLAGS="${POPPLER_CMAKE_FLAGS}"
          fi
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DPDFDOCUMENTVIEW_BUILD_EXAMPLES=ON \
            -DBUILD_TESTING=ON \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_PREFIX_PATH="${QT_ROOT_DIR}" \
            ${ARCH_FLAGS} \
            ${EXTRA_FLAGS}

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Install-tree CMake consumer smoke
        run: |
          cmake --install build --prefix "$GITHUB_WORKSPACE/install-stage"
          cmake -S tests/cmake_consumer_smoke -B consumer-build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$GITHUB_WORKSPACE/install-stage;${QT_ROOT_DIR}"
          cmake --build consumer-build

  # Prove PDFIUM resolves without CMake fetch (air-gapped / policy path): cache the
  # same pinned bblanchon tarball as cmake/PdfiumPrebuilt.cmake (linux x64).
  pdfium-root-no-fetch:
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Cache extracted PDFium prebuilt (linux x64)
        id: pdfium-prebuilt
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.cache/pdfium-linux-x64-root
          key: pdfium-linux-x64-${{ hashFiles('cmake/PdfiumPrebuilt.cmake') }}

      - name: Download and extract PDFium prebuilt (cache miss)
        if: steps.pdfium-prebuilt.outputs.cache-hit != 'true'
        env:
          PDFIUM_URL: https://github.com/bblanchon/pdfium-binaries/releases/download/chromium%2F7834/pdfium-linux-x64.tgz
          EXPECTED_SHA256: e10b18234af3e988b3021547786e574b8905a24511067f14773f29c9cac12365
        run: |
          set -euo pipefail
          ROOT="${GITHUB_WORKSPACE}/.cache/pdfium-linux-x64-root"
          rm -rf "${ROOT}"
          mkdir -p "${ROOT}" "${GITHUB_WORKSPACE}/.cache/_dl"
          curl -fsSL "${PDFIUM_URL}" -o "${GITHUB_WORKSPACE}/.cache/_dl/pdfium-linux-x64.tgz"
          echo "${EXPECTED_SHA256}  ${GITHUB_WORKSPACE}/.cache/_dl/pdfium-linux-x64.tgz" | sha256sum -c -
          tar xzf "${GITHUB_WORKSPACE}/.cache/_dl/pdfium-linux-x64.tgz" -C "${ROOT}"
          test -f "${ROOT}/include/fpdfview.h"
          test -d "${ROOT}/licenses"

      - name: Install Qt 6.8.3
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.3"
          cache: true
          archives: qtbase icu
          target: desktop
          host: linux
          arch: linux_gcc_64

      - name: Configure with PDFIUM_ROOT (fetch OFF)
        env:
          PDFIUM_ROOT: ${{ github.workspace }}/.cache/pdfium-linux-x64-root
        run: |
          cmake -S . -B build-nofetch \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="${QT_ROOT_DIR}" \
            -DPDFDOCUMENTVIEW_BUILD_EXAMPLES=ON \
            -DBUILD_TESTING=ON \
            -DPDFDOCUMENTVIEW_FETCH_PDFIUM=OFF \
            -DPDFIUM_ROOT="${PDFIUM_ROOT}"

      - name: Build + test (no PDFium download at configure)
        run: |
          cmake --build build-nofetch --parallel
          ctest --test-dir build-nofetch --output-on-failure

      - name: Aggregate PDFium notices (smoke)
        env:
          PDFIUM_ROOT: ${{ github.workspace }}/.cache/pdfium-linux-x64-root
        run: |
          python3 tools/aggregate_pdfium_third_party_notices.py \
            --pdfium-root "${PDFIUM_ROOT}" \
            --out "${GITHUB_WORKSPACE}/build-nofetch/THIRD_PARTY_NOTICES.pdfium.md"
          test -s "${GITHUB_WORKSPACE}/build-nofetch/THIRD_PARTY_NOTICES.pdfium.md"
